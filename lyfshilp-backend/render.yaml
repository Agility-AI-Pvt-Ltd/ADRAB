services:
  # 1. FastAPI Backend Web Service
  - type: web
    name: lyfshilp-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lyfshilp-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        # This will be replaced with the actual frontend URL later, but setting allowing all for staging
        value: "https://lyfshilp-frontend.onrender.com,http://localhost:5173"

  # 2. React Vite Frontend Static Site
  - type: web
    name: lyfshilp-frontend
    env: static
    buildCommand: "npm install && npm run build"
    publishPath: "dist"
    rootDir: "lyfshilp-frontend"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: lyfshilp-backend
          property: url
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false

databases:
  # 3. Managed PostgreSQL Database
  - name: lyfshilp-db
    databaseName: lyfshilp
    user: lyfshilp_user
    plan: free # Change this to a paid tier if needed
